<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screen Time Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #3A1259; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 620px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #D6A24E; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input { width: 100%; background: #2C0A45; border: 1px solid #6E419C; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus { outline: none; border-color: #D6A24E; }
  .panel { background: #4C2473; border: 1px solid #5C3187; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 100px; }
  .btn { background: #D6A24E; color: #3A1259; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #D6A24E; border: 1px solid #D6A24E; }
  .stats { display: flex; gap: 10px; margin-bottom: 12px; }
  .stat { flex: 1; background: #4C2473; border: 1px solid #5C3187; border-radius: 10px; padding: 13px; text-align: center; }
  .stat .v { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: #D6A24E; }
  .stat .l { font-size: .67rem; opacity: .65; text-transform: uppercase; }
  .barwrap { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; font-size: .82rem; }
  .barwrap .lb { width: 64px; flex: none; opacity: .8; }
  .barwrap .tr { flex: 1; background: #4C2473; border-radius: 4px; height: 14px; overflow: hidden; }
  .barwrap .tr>i { display: block; height: 100%; }
  .barwrap .pc { width: 56px; text-align: right; flex: none; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 14px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Screen Time Tracker</h1>
  <p class="sub">Log your daily screen hours and set a goal. Awareness is the first step to less.</p>

  <div class="panel">
    <div class="row">
      <div><label>Date</label><input id="dt" type="date"></div>
      <div><label>Screen hours</label><input id="hrs" type="number" min="0" max="24" step="0.5" placeholder="e.g. 4.5"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Log</button></div>
    </div>
    <label>Daily goal (hours or less)</label>
    <input id="goal" type="number" min="0" step="0.5" placeholder="e.g. 3" oninput="saveGoal();render()">
  </div>

  <div class="stats">
    <div class="stat"><div class="v" id="sToday">—</div><div class="l">Today</div></div>
    <div class="stat"><div class="v" id="sAvg">—</div><div class="l">7-day avg</div></div>
    <div class="stat"><div class="v" id="sHit">0</div><div class="l">Days under goal</div></div>
  </div>

  <div class="panel" id="chartW" style="display:none">
    <div style="font-family:'Playfair Display',serif;color:#D6A24E;margin-bottom:8px">Last 10 days</div>
    <div id="chart"></div>
  </div>

  <div class="panel">
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id);
  let R=JSON.parse(localStorage.getItem('stt')||'[]');
  const save=()=>localStorage.setItem('stt',JSON.stringify(R));
  g('dt').value=new Date().toISOString().slice(0,10);
  if(localStorage.getItem('stt_goal'))g('goal').value=localStorage.getItem('stt_goal');
  function saveGoal(){ localStorage.setItem('stt_goal',g('goal').value); }
  function add(){ const h=parseFloat(g('hrs').value); if(isNaN(h)){alert('Enter screen hours.');return;}
    const d=g('dt').value||new Date().toISOString().slice(0,10);
    const ex=R.find(x=>x.d===d); if(ex)ex.h=h; else R.push({d,h});
    g('hrs').value=''; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all logs?')){ R=[]; save(); render(); } }
  function render(){
    const goal=parseFloat(g('goal').value);
    const S=[...R].sort((a,b)=>a.d<b.d?-1:1);
    const today=R.find(x=>x.d===new Date().toISOString().slice(0,10));
    g('sToday').textContent=today?today.h+'h':'—';
    const last7=S.slice(-7);
    g('sAvg').textContent=last7.length?(last7.reduce((s,x)=>s+x.h,0)/last7.length).toFixed(1)+'h':'—';
    g('sHit').textContent= !isNaN(goal)?R.filter(x=>x.h<=goal).length:'—';
    if(S.length){
      g('chartW').style.display='block';
      const max=Math.max(...S.map(x=>x.h),goal||0,1);
      g('chart').innerHTML=S.slice(-10).map(x=>{
        const under=!isNaN(goal)&&x.h<=goal;
        return '<div class="barwrap"><span class="lb">'+x.d.slice(5)+'</span><div class="tr"><i style="width:'+(x.h/max*100)+'%;background:'+(under?'#D6A24E':'#D6A24E')+'"></i></div><span class="pc">'+x.h+'h</span></div>';
      }).join('');
    } else g('chartW').style.display='none';
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No screen time logged yet.</div>'; return; }
    L.innerHTML=[...S].reverse().map(x=>{ const i=R.indexOf(x);
      const under=!isNaN(goal)&&x.h<=goal;
      return '<div class="barwrap" style="justify-content:space-between"><span><b style="color:#D6A24E">'+x.d+'</b> · '+x.h+'h '+(under?'✓':'')+'</span><span class="pc" style="cursor:pointer;opacity:.5" onclick="del('+i+')">✕</span></div>';
    }).join('');
  }
  render();
</script>
</body>
</html>
