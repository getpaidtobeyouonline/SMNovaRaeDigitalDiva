<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Progress Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #3A1259; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #D6A24E; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select, textarea { width: 100%; background: #2C0A45; border: 1px solid #6E419C; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; resize: vertical; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: #D6A24E; }
  .panel { background: #4C2473; border: 1px solid #5C3187; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 90px; }
  .btn { background: #D6A24E; color: #3A1259; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #D6A24E; border: 1px solid #D6A24E; }
  .grp { font-size: .78rem; text-transform: uppercase; letter-spacing: .04em; color: #D6A24E; margin: 14px 0 6px; }
  .item { background: #2C0A45; border: 1px solid #6E419C; border-radius: 8px; padding: 9px 12px; margin-bottom: 6px; }
  .item .top { display: flex; justify-content: space-between; gap: 8px; }
  .item .meta { font-size: .8rem; opacity: .65; }
  .score { color: #D6A24E; font-weight: 500; flex: none; }
  .item .x { cursor: pointer; opacity: .5; flex: none; } .item .x:hover { opacity: 1; color: #D6A24E; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 14px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Client Progress Tracker</h1>
  <p class="sub">Log every check-in so each client sees how far they have come.</p>

  <div class="panel">
    <div class="row">
      <div style="flex:2"><label>Client</label><input id="client" placeholder="Client name"></div>
      <div><label>Date</label><input id="date" type="date"></div>
      <div><label>Progress 1-10</label><select id="rate"><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option selected>6</option><option>7</option><option>8</option><option>9</option><option>10</option></select></div>
    </div>
    <label>Session note / win</label>
    <input id="note" placeholder="A win, a shift, or what to focus on next">
    <button class="btn" onclick="add()" style="margin-top:10px">+ Add Check-In</button>
  </div>

  <div class="panel">
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:8px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('clpt')||'[]');
  const save=()=>localStorage.setItem('clpt',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ if(!v('client')){ alert('Enter a client name.'); return; }
    R.push({c:v('client'),d:g('date').value,r:g('rate').value,n:v('note')}); g('note').value=''; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all check-ins?')){ R=[]; save(); render(); } }
  function render(){
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No check-ins logged yet.</div>'; return; }
    const names=[...new Set(R.map(x=>x.c))].sort();
    L.innerHTML=names.map(nm=>{
      const items=R.map((x,i)=>({x,i})).filter(o=>o.x.c===nm);
      return '<div class="grp">'+esc(nm)+'</div>'+items.map(({x,i})=>
        '<div class="item"><div class="top"><span class="meta">'+(x.d||'—')+'</span><span><span class="score">'+x.r+'/10</span> <span class="x" onclick="del('+i+')">✕</span></span></div>'+(x.n?'<div>'+esc(x.n)+'</div>':'')+'</div>').join('');
    }).join('');
  }
  render();
</script>
</body>
</html>
