<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gratitude Journal Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #3A1259; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #D6A24E; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 20px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, textarea { width: 100%; background: #2C0A45; border: 1px solid #6E419C; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  input:focus, textarea:focus { outline: none; border-color: #D6A24E; }
  textarea { min-height: 50px; }
  .panel { background: #4C2473; border: 1px solid #5C3187; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .btn { background: #D6A24E; color: #3A1259; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #D6A24E; border: 1px solid #D6A24E; margin-top: 12px; }
  .stat { font-size: .85rem; opacity: .8; margin-bottom: 12px; } .stat b { color:#D6A24E; }
  .ent { background: #2C0A45; border: 1px solid #6E419C; border-left: 3px solid #D6A24E; border-radius: 8px; padding: 12px 15px; margin-bottom: 9px; }
  .ent .d { font-size: .8rem; opacity: .6; }
  .ent ul { margin: 4px 0 0 16px; font-size: .92rem; }
  .ent .x { float:right; cursor: pointer; opacity: .5; } .ent .x:hover { opacity: 1; color: #D6A24E; }
  .empty { text-align: center; opacity: .5; padding: 18px 0; font-style: italic; font-size: .9rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Gratitude Journal Tool</h1>
  <p class="sub">Three specific things, daily. Specific beats generic — that is what changes the brain.</p>

  <div class="panel">
    <label for="g1">1 — something small from today</label>
    <input id="g1" placeholder="The smaller and more specific, the better">
    <label for="g2">2 — a person you appreciate (and why)</label>
    <input id="g2" placeholder="Naming why activates the effect">
    <label for="g3">3 — something about you</label>
    <input id="g3" placeholder="A trait, an effort, a small win">
    <button class="btn" onclick="save()">+ Save Today</button>
  </div>

  <div class="stat" id="stat"></div>
  <div id="list"></div>
  <button class="btn ghost" onclick="clearAll()">Clear All</button>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let E=JSON.parse(localStorage.getItem('gj')||'[]');
  const saveLs=()=>localStorage.setItem('gj',JSON.stringify(E));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function save(){ const a=v('g1'), b=v('g2'), c=v('g3'); if(!a&&!b&&!c){alert('Add at least one.');return;}
    const d=new Date().toISOString().slice(0,10);
    const ex=E.find(x=>x.d===d); if(ex){ex.i=[a,b,c].filter(Boolean);} else E.push({d,i:[a,b,c].filter(Boolean)});
    ['g1','g2','g3'].forEach(k=>g(k).value=''); saveLs(); render(); }
  function del(i){ E.splice(i,1); saveLs(); render(); }
  function clearAll(){ if(confirm('Clear journal?')){ E=[]; saveLs(); render(); } }
  function streak(){ const days=[...new Set(E.map(x=>x.d))].sort().reverse(); let s=0, d=new Date(); for(let i=0;i<days.length;i++){ const dd=d.toISOString().slice(0,10); if(days[i]===dd){s++; d.setDate(d.getDate()-1);} else if(i===0 && days[i]===new Date(d.getTime()-864e5).toISOString().slice(0,10)){d.setDate(d.getDate()-1); s++;} else break;} return s; }
  function render(){
    g('stat').innerHTML = E.length?`<b>${E.length}</b> entries · streak <b>${streak()}</b> day${streak()===1?'':'s'}`:'';
    const L=g('list');
    if(!E.length){ L.innerHTML='<div class="empty">No entries yet — three specific things will do it.</div>'; return; }
    L.innerHTML=[...E].sort((a,b)=>a.d<b.d?1:-1).map((x,i)=>`<div class="ent"><span class="x" onclick="del(${E.indexOf(x)})">✕</span><div class="d">${x.d}</div><ul>${x.i.map(t=>`<li>${esc(t)}</li>`).join('')}</ul></div>`).join('');
  }
  render();
</script>
</body>
</html>
