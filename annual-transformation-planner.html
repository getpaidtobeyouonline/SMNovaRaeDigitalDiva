<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Annual Transformation Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #3A1259; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #D6A24E; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2C0A45; border: 1px solid #6E419C; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  input:focus, textarea:focus { outline: none; border-color: #D6A24E; }
  textarea { min-height: 56px; }
  .panel { background: #4C2473; border: 1px solid #5C3187; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #D6A24E; color: #3A1259; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; margin: 14px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #D6A24E; border: 1px solid #D6A24E; }
  .blk { background: #2C0A45; border: 1px solid #6E419C; border-left: 3px solid #D6A24E; border-radius: 8px; padding: 13px 16px; margin-bottom: 10px; }
  .blk h4 { color: #D6A24E; font-size: .76rem; text-transform: uppercase; margin-bottom: 5px; }
  .blk p { font-size: .93rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Annual Transformation Planner</h1>
  <p class="sub">Forget 87 goals. Plan the one identity, one theme, and three moves that will reshape your year.</p>

  <div class="panel">
    <label for="identity">Who am I becoming this year? (in one line)</label>
    <input id="identity" placeholder='e.g. "the person who finishes what she starts"'>
    <label for="theme">One word for the year</label>
    <input id="theme" placeholder='e.g. "Build" / "Rest" / "Brave" / "Receive"'>
    <label for="move1">Big move 1</label>
    <textarea id="move1" placeholder="Specific, dated outcome"></textarea>
    <label for="move2">Big move 2</label>
    <textarea id="move2"></textarea>
    <label for="move3">Big move 3</label>
    <textarea id="move3"></textarea>
    <label for="stop">What I am stopping this year</label>
    <textarea id="stop" placeholder="The habits / commitments / patterns coming with me into the year end here"></textarea>
    <label for="non">Non-negotiables (the things I will defend no matter what)</label>
    <textarea id="non" placeholder="Health, sleep, family, one creative hour daily — whatever yours are"></textarea>
    <button class="btn" onclick="gen()">Build My Year</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <div id="out"></div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['identity','theme','move1','move2','move3','stop','non'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('atp_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('atp_'+k,g(k).value)); });
  function gen(){
    g('out').innerHTML='<div class="blk"><h4>Becoming this year</h4><p>'+esc(v('identity')||'—')+'</p></div>'+
      '<div class="blk"><h4>Word of the year</h4><p style="font-family:\'Playfair Display\',serif;font-size:1.3rem;color:#D6A24E">'+esc(v('theme')||'—')+'</p></div>'+
      '<div class="blk"><h4>Three big moves</h4><p>1. '+esc(v('move1')||'—')+'<br>2. '+esc(v('move2')||'—')+'<br>3. '+esc(v('move3')||'—')+'</p></div>'+
      '<div class="blk" style="border-left-color:#D6A24E"><h4>What ends here</h4><p>'+esc(v('stop')||'—')+'</p></div>'+
      '<div class="blk"><h4>Non-negotiables</h4><p>'+esc(v('non')||'—')+'</p></div>'+
      '<div class="blk" style="border-left-color:#D8C6EA"><h4>The discipline</h4><p>Read this on the first of every month. If a decision does not honour the identity, theme, moves, or non-negotiables &mdash; it does not belong in your year.</p></div>';
    g('out').scrollIntoView({behavior:'smooth'});
  }
  function esc(t){ return (t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  function copyOut(){ const t=g('out').innerText; if(!t){alert('Build first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
  gen();
</script>
</body>
</html>
