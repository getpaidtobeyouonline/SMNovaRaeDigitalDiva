<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financial Boundary Setter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #3A1259; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #D6A24E; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 8px 0 5px; }
  input, select { width: 100%; background: #2C0A45; border: 1px solid #6E419C; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #D6A24E; }
  .panel { background: #4C2473; border: 1px solid #5C3187; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; } .row>div { flex: 1; min-width: 130px; }
  .btn { background: #D6A24E; color: #3A1259; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #D6A24E; border: 1px solid #D6A24E; margin-top: 12px; }
  .bnd { background: #2C0A45; border: 1px solid #6E419C; border-left: 3px solid #D6A24E; border-radius: 8px; padding: 13px 16px; margin-bottom: 10px; }
  .bnd .nm { font-weight: 500; color: #D6A24E; }
  .bnd .scr { font-size: .9rem; opacity: .9; margin-top: 4px; }
  .bnd .x { cursor: pointer; opacity: .5; font-size: .8rem; } .bnd .x:hover { opacity: 1; color: #D6A24E; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 14px 0; font-style: italic; }
  .note { background:#43196A;border:1px solid #C9A24B;border-radius:8px;padding:11px 14px;font-size:.85rem;margin-bottom:12px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Financial Boundary Setter</h1>
  <p class="sub">Name the money boundary, write the line you'll actually say, save it for the next ask.</p>

  <div class="note">Money boundaries fail because we improvise them in real time. Pre-write the line — kindly, clearly — so you can use it without scrambling.</div>

  <div class="panel">
    <div class="row">
      <div style="flex:2"><label>The boundary</label><input id="nm" placeholder="e.g. I don't lend money to friends"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Save</button></div>
    </div>
    <label for="scr">The script you'll actually say</label>
    <input id="scr" placeholder='e.g. "I love you and I don\'t lend money — but here\'s a free idea: …"'>
  </div>

  <div id="list"></div>
  <button class="btn ghost" onclick="clearAll()">Clear All</button>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let B=JSON.parse(localStorage.getItem('fbs')||'[]');
  const save=()=>localStorage.setItem('fbs',JSON.stringify(B));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ const nm=v('nm'); if(!nm){alert('Name the boundary.');return;} B.push({nm,scr:v('scr')}); ['nm','scr'].forEach(k=>g(k).value=''); save(); render(); }
  function del(i){ B.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all?')){ B=[]; save(); render(); } }
  function render(){
    const L=g('list');
    if(!B.length){ L.innerHTML='<div class="empty">No boundaries saved yet.</div>'; return; }
    L.innerHTML=B.map((x,i)=>`<div class="bnd"><div class="nm">${esc(x.nm)}</div>${x.scr?`<div class="scr">"${esc(x.scr)}"</div>`:''}<div style="margin-top:6px"><span class="x" onclick="del(${i})">✕ remove</span></div></div>`).join('');
  }
  render();
</script>
</body>
</html>
