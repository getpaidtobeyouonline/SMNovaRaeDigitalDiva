<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Income vs Expenses Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #3A1259; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 760px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #D6A24E; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 8px 0 5px; }
  input { width: 100%; background: #2C0A45; border: 1px solid #6E419C; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus { outline: none; border-color: #D6A24E; }
  .panel { background: #4C2473; border: 1px solid #5C3187; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .addrow { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; } .addrow>div { flex: 1; min-width: 90px; }
  .btn { background: #D6A24E; color: #3A1259; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #D6A24E; border: 1px solid #D6A24E; margin-top: 12px; }
  .stats { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
  .stat { flex: 1; min-width: 120px; background: #4C2473; border: 1px solid #5C3187; border-radius: 10px; padding: 12px; text-align: center; }
  .stat .v { font-family: 'Playfair Display', serif; font-size: 1.35rem; color: #D6A24E; }
  .stat .l { font-size: .69rem; opacity: .65; text-transform: uppercase; }
  .stat.neg .v { color: #D6A24E; }
  .mrow { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; font-size: .82rem; }
  .mrow .lb { width: 75px; opacity: .8; flex: none; }
  .mrow .tr { flex: 1; background: #4C2473; border-radius: 4px; height: 14px; overflow: hidden; position: relative; }
  .mrow .tr i { display: block; height: 100%; background: #D6A24E; }
  .mrow .tr i.exp { background: #D6A24E; }
  .mrow .pc { width: 90px; text-align: right; flex: none; }
  .row { background: #2C0A45; border: 1px solid #6E419C; border-radius: 7px; padding: 8px 11px; margin-bottom: 6px; display: flex; justify-content: space-between; font-size: .85rem; }
  .row .x { cursor: pointer; opacity: .5; } .row .x:hover { opacity: 1; color: #D6A24E; }
  .empty { text-align: center; opacity: .5; font-size: .87rem; padding: 14px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Income vs Expenses Dashboard</h1>
  <p class="sub">Log income and expenses monthly. See the trend and the gap that matters.</p>

  <div class="panel">
    <div class="addrow">
      <div><label for="mo">Month</label><input id="mo" type="month"></div>
      <div><label for="inc">Income</label><input id="inc" type="number" min="0"></div>
      <div><label for="exp">Expenses</label><input id="exp" type="number" min="0"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Log</button></div>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="v" id="sI">$0</div><div class="l">Avg income</div></div>
    <div class="stat"><div class="v" id="sE">$0</div><div class="l">Avg expenses</div></div>
    <div class="stat"><div class="v" id="sG">$0</div><div class="l">Avg surplus</div></div>
    <div class="stat"><div class="v" id="sR">—</div><div class="l">Savings rate</div></div>
  </div>

  <div class="panel" id="chartW" style="display:none">
    <div style="font-family:'Playfair Display',serif;color:#D6A24E;margin-bottom:8px">Trend</div>
    <div id="chart"></div>
  </div>

  <div class="panel">
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim(), nu=id=>parseFloat(g(id).value)||0;
  let R=JSON.parse(localStorage.getItem('ied')||'[]');
  const save=()=>localStorage.setItem('ied',JSON.stringify(R));
  function add(){ const m=v('mo'); if(!m){alert('Pick a month.');return;}
    const ex=R.find(x=>x.m===m); if(ex){ex.i=nu('inc');ex.e=nu('exp');} else R.push({m,i:nu('inc'),e:nu('exp')});
    ['inc','exp'].forEach(k=>g(k).value=''); save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all?')){ R=[]; save(); render(); } }
  function render(){
    if(!R.length){ g('sI').textContent=g('sE').textContent=g('sG').textContent='$0'; g('sR').textContent='—'; g('chartW').style.display='none'; g('list').innerHTML='<div class="empty">No months logged yet.</div>'; return; }
    const ai=R.reduce((s,x)=>s+x.i,0)/R.length, ae=R.reduce((s,x)=>s+x.e,0)/R.length;
    g('sI').textContent='$'+Math.round(ai).toLocaleString();
    g('sE').textContent='$'+Math.round(ae).toLocaleString();
    const gap=ai-ae;
    g('sG').textContent=(gap<0?'-$':'$')+Math.abs(Math.round(gap)).toLocaleString();
    document.querySelectorAll('.stat').forEach(s=>s.classList.remove('neg'));
    if(gap<0) g('sG').parentElement.classList.add('neg');
    g('sR').textContent=ai>0?Math.round(gap/ai*100)+'%':'—';
    g('chartW').style.display='block';
    const mx=Math.max(...R.map(x=>Math.max(x.i,x.e)),1);
    g('chart').innerHTML=[...R].sort((a,b)=>a.m<b.m?-1:1).slice(-8).map(x=>`
      <div class="mrow"><span class="lb">${x.m}</span><div class="tr"><i style="width:${Math.round(x.i/mx*100)}%"></i></div><span class="pc" style="color:#D6A24E">+${x.i.toLocaleString()}</span></div>
      <div class="mrow"><span class="lb"></span><div class="tr"><i class="exp" style="width:${Math.round(x.e/mx*100)}%"></i></div><span class="pc" style="color:#D6A24E">-${x.e.toLocaleString()}</span></div>`).join('');
    g('list').innerHTML=[...R].sort((a,b)=>a.m<b.m?1:-1).map((x,i)=>{ const idx=R.indexOf(x); const g2=x.i-x.e;
      return `<div class="row"><span><b style="color:#D6A24E">${x.m}</b> · in $${x.i.toLocaleString()} · out $${x.e.toLocaleString()}</span><span style="color:${g2>=0?'#D6A24E':'#D6A24E'}">${g2>=0?'+':''}$${g2.toLocaleString()} <span class="x" onclick="del(${idx})">✕</span></span></div>`;
    }).join('');
  }
  render();
</script>
</body>
</html>
