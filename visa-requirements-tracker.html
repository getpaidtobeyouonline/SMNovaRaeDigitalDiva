<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visa Requirements Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #3A1259; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 660px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.9rem; color: #D6A24E; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2C0A45; border: 1px solid #6E419C; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #D6A24E; }
  .panel { background: #4C2473; border: 1px solid #5C3187; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; } .row>div { flex: 1; min-width: 120px; }
  .btn { background: #D6A24E; color: #3A1259; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; margin-top: 12px; }
  .btn.ghost { background: transparent; color: #D6A24E; border: 1px solid #D6A24E; }
  .visa { background: #2C0A45; border: 1px solid #6E419C; border-radius: 8px; padding: 11px 14px; margin-bottom: 7px; display: flex; justify-content: space-between; align-items: center; font-size: .87rem; gap: 10px; }
  .visa .country { color: #D6A24E; font-weight: 500; }
  .visa .st { cursor: pointer; font-size: .78rem; flex: none; }
  .visa .x { cursor: pointer; opacity: .5; flex: none; } .visa .x:hover { opacity: 1; color: #D6A24E; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 12px 0; font-style: italic; }
  .note { background: #2C0A45; border: 1px solid #6E419C; border-radius: 8px; padding: 10px 13px; font-size: .8rem; opacity: .75; margin-top: 10px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Visa Requirements Tracker</h1>
  <p class="sub">Multi-country trip? Track the visa needed for each and where each application stands.</p>

  <div class="panel">
    <div class="row">
      <div style="flex:2"><label>Country</label><input id="country" placeholder="e.g. Vietnam"></div>
      <div><label>Visa type</label><select id="type"><option>Not needed</option><option>Visa on arrival</option><option>e-Visa</option><option>Embassy visa</option><option>Need to check</option></select></div>
    </div>
    <button class="btn" onclick="add()">+ Add Country</button>
    <div class="note">Visa rules change and depend on your nationality — always confirm with the official government source.</div>
  </div>

  <div class="panel">
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:8px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('vrt')||'[]');
  const save=()=>localStorage.setItem('vrt',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const STATES=['To research','Researched','Applied','Approved'];
  const COL={'Not needed':'#D6A24E','Visa on arrival':'#D6A24E','e-Visa':'#D6A24E','Embassy visa':'#D6A24E','Need to check':'#D6A24E'};
  function add(){ if(!v('country')){ alert('Enter a country.'); return; }
    R.push({c:v('country'),t:g('type').value,s:0}); g('country').value=''; save(); render(); }
  function cycle(i){ R[i].s=(R[i].s+1)%STATES.length; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all countries?')){ R=[]; save(); render(); } }
  function render(){
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No countries added yet.</div>'; return; }
    L.innerHTML=R.map((x,i)=>
      '<div class="visa"><span><span class="country">'+esc(x.c)+'</span><br><span style="color:'+(COL[x.t]||'#D6A24E')+';font-size:.8rem">'+x.t+'</span></span><span style="display:flex;gap:10px;align-items:center"><span class="st" style="color:#D6A24E" onclick="cycle('+i+')">'+STATES[x.s]+' ⟳</span><span class="x" onclick="del('+i+')">✕</span></span></div>').join('');
  }
  render();
</script>
</body>
</html>
