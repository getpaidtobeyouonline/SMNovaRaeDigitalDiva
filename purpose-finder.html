<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purpose Finder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #3A1259; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #D6A24E; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2C0A45; border: 1px solid #6E419C; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  input:focus, textarea:focus { outline: none; border-color: #D6A24E; }
  textarea { min-height: 56px; }
  .panel { background: #4C2473; border: 1px solid #5C3187; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #D6A24E; color: #3A1259; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; margin: 14px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #D6A24E; border: 1px solid #D6A24E; }
  .res { background: #2C0A45; border: 1px solid #6E419C; border-left: 3px solid #D6A24E; border-radius: 8px; padding: 18px; text-align: center; }
  .res .stmt { font-family: 'Playfair Display', serif; color: #D6A24E; font-size: 1.3rem; line-height: 1.4; margin-bottom: 12px; }
  .res p { font-size: .92rem; opacity: .85; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Purpose Finder</h1>
  <p class="sub">Stop hunting for ONE grand purpose. Build a working one from your gifts and what moves you.</p>

  <div class="panel">
    <label for="strength">A strength you have (something easy for you, hard for others)</label>
    <input id="strength" placeholder="e.g. making complex things simple">
    <label for="problem">A problem that genuinely upsets you in the world</label>
    <input id="problem" placeholder="e.g. people staying stuck for fear of looking bad">
    <label for="who">A specific group of people you feel called to help</label>
    <input id="who" placeholder="e.g. women starting their first online business">
    <label for="how">How you would help them, using your strength</label>
    <textarea id="how" placeholder="The shape of the work"></textarea>
    <button class="btn" onclick="gen()">Write My Purpose Statement</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <div id="out"></div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['strength','problem','who','how'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('pf_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('pf_'+k,g(k).value)); });
  function gen(){
    const s=v('strength')||'(your strength)', p=v('problem')||'(the problem)', w=v('who')||'(your people)', h=v('how')||'(the way you help)';
    g('out').innerHTML='<div class="res"><div class="stmt">"I use my gift for <b>'+esc(s)+'</b> to help <b>'+esc(w)+'</b> '+esc(h)+' — so that they no longer suffer from <b>'+esc(p)+'</b>."</div>'+
      '<p>This is a working draft, not a final tattoo. Revise as you grow. Purpose is something you serve, not something you find &mdash; show up and refine.</p></div>';
    g('out').scrollIntoView({behavior:'smooth'});
  }
  function esc(t){ return (t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  function copyOut(){ const t=g('out').innerText; if(!t){alert('Write it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
  gen();
</script>
</body>
</html>
