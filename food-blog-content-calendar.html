<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Blog Content Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #3A1259; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.85rem; color: #D6A24E; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2C0A45; border: 1px solid #6E419C; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #D6A24E; }
  .panel { background: #4C2473; border: 1px solid #5C3187; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 100px; }
  .btn { background: #D6A24E; color: #3A1259; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #D6A24E; border: 1px solid #D6A24E; }
  .post { background: #2C0A45; border: 1px solid #6E419C; border-radius: 8px; padding: 10px 13px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; font-size: .87rem; gap: 10px; }
  .post.done { border-left: 3px solid #D6A24E; }
  .post .meta { font-size: .76rem; opacity: .65; }
  .post .st { cursor: pointer; font-size: .78rem; color: #D6A24E; flex: none; }
  .post .x { cursor: pointer; opacity: .5; flex: none; } .post .x:hover { opacity: 1; color: #D6A24E; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 12px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Food Blog Content Calendar</h1>
  <p class="sub">Plan your recipe posts ahead — by date, with a status for each.</p>

  <div class="panel">
    <div class="row">
      <div style="flex:2"><label>Recipe / post title</label><input id="title" placeholder="e.g. 20-minute weeknight pasta"></div>
      <div><label>Publish date</label><input id="date" type="date"></div>
      <div><label>Type</label><select id="type"><option>Recipe</option><option>Round-up</option><option>Guide / how-to</option><option>Seasonal</option><option>Personal</option></select></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
  </div>

  <div class="panel">
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:8px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('fbcc')||'[]');
  const save=()=>localStorage.setItem('fbcc',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const STATES=['Idea','Recipe tested','Photographed','Written','Published'];
  function add(){ if(!v('title')){ alert('Enter a post title.'); return; }
    R.push({t:v('title'),d:g('date').value,type:g('type').value,s:0}); g('title').value=''; g('date').value=''; save(); render(); }
  function cycle(i){ R[i].s=(R[i].s+1)%STATES.length; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear the calendar?')){ R=[]; save(); render(); } }
  function render(){
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No posts planned yet.</div>'; return; }
    L.innerHTML=R.map((x,i)=>({x,i})).sort((a,b)=>(a.x.d||'9999')<(b.x.d||'9999')?-1:1).map(({x,i})=>
      '<div class="post'+(x.s===4?' done':'')+'"><span><b style="color:#D6A24E">'+esc(x.t)+'</b><br><span class="meta">'+(x.d||'no date')+' · '+x.type+'</span></span><span style="display:flex;gap:10px;align-items:center"><span class="st" onclick="cycle('+i+')">'+STATES[x.s]+' ⟳</span><span class="x" onclick="del('+i+')">✕</span></span></div>').join('');
  }
  render();
</script>
</body>
</html>
