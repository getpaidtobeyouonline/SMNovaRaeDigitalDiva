<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rainy Day Activity Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #3A1259; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 620px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #D6A24E; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  .panel { background: #4C2473; border: 1px solid #5C3187; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(170px,1fr)); gap: 8px; }
  .card { background: #2C0A45; border: 1px solid #6E419C; border-radius: 8px; padding: 10px 12px; font-size: .92rem; cursor: pointer; transition: border-color .2s; }
  .card:hover, .card.on { border-color: #D6A24E; }
  .card.on { background: #3A1259; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  .btn { background: #D6A24E; color: #3A1259; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 12px 8px 0 0; }
  .btn.ghost { background: transparent; color: #D6A24E; border: 1px solid #D6A24E; }
  pre { background: #2C0A45; border: 1px solid #6E419C; border-left: 3px solid #D6A24E; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Rainy Day Activity Planner</h1>
  <p class="sub">Tap the activities you fancy and build a rainy-day timetable.</p>

  <div class="panel">
    <label>Pick your activities</label>
    <div class="grid" id="grid"></div>
    <button class="btn" onclick="gen()">Build Today's Plan</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id);
  const IDEAS=['Pillow fort','Indoor picnic','Cardboard castle','Bake biscuits','Dance party','Movie afternoon','Board game tournament','Craft station','Read together','Cook with kids','Drawing challenge','Treasure hunt','Talent show','Science experiment','Yoga or stretching','Lego build','Puppet show','Karaoke','Story-writing','Jigsaw puzzle','Quiet reading nook','Make a card for someone','Tidy a drawer (yes really!)','Build the longest paper chain'];
  let sel=JSON.parse(localStorage.getItem('rdap')||'[]');
  function draw(){
    g('grid').innerHTML=IDEAS.map(t=>'<div class="card'+(sel.includes(t)?' on':'')+'" onclick="tog(\''+t.replace(/'/g,"\\'")+'\')">'+t+'</div>').join('');
  }
  function tog(t){ const i=sel.indexOf(t); if(i>=0)sel.splice(i,1); else sel.push(t); localStorage.setItem('rdap',JSON.stringify(sel)); draw(); }
  function gen(){
    if(!sel.length){ alert('Pick some activities first!'); return; }
    const slots=['Morning','Mid-morning','After lunch','Afternoon','Wind-down'];
    let plan=''; sel.slice(0,slots.length).forEach((a,i)=>{ plan+=slots[i]+':  '+a+'\n'; });
    const extras=sel.slice(slots.length);
    const t='RAINY DAY PLAN\n\n'+plan+(extras.length?'\nOR DIP INTO:\n'+extras.map(x=>'  • '+x).join('\n')+'\n':'')+
    '\n--- Rainy-day tips ---\nMix big and small activities so energy and quiet take turns.\nLet the kids pick the order — it becomes their day, not just yours.\nA messy activity is fine — clean-up can be part of the fun.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
  draw();
</script>
</body>
</html>
