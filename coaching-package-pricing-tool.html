<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coaching Package Pricing Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #3A1259; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #D6A24E; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input { width: 100%; background: #2C0A45; border: 1px solid #6E419C; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; }
  input:focus { outline: none; border-color: #D6A24E; }
  .panel { background: #4C2473; border: 1px solid #5C3187; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; } .grid>div { flex: 1; min-width: 130px; }
  .btn { background: #D6A24E; color: #3A1259; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin-top: 14px; }
  .tiers { display: none; }
  .tier { background: #2C0A45; border: 1px solid #6E419C; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }
  .tier.feat { border-color: #D6A24E; }
  .tier .nm { font-size: .8rem; text-transform: uppercase; letter-spacing: .04em; color: #D6A24E; }
  .tier .pr { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: #FFFFFF; }
  .tier .ds { font-size: .82rem; opacity: .7; }
  .note { background: #2C0A45; border: 1px solid #6E419C; border-radius: 8px; padding: 10px 13px; font-size: .8rem; opacity: .75; margin-top: 12px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Coaching Package Pricing Tool</h1>
  <p class="sub">Price a coaching package on real numbers — then see three confident tiers.</p>

  <div class="panel">
    <div class="grid">
      <div><label>Sessions in the package</label><input id="sessions" type="number" min="1" placeholder="e.g. 6"></div>
      <div><label>Minutes per session</label><input id="mins" type="number" min="0" placeholder="e.g. 60"></div>
    </div>
    <div class="grid">
      <div><label>Prep + admin mins / session</label><input id="prep" type="number" min="0" placeholder="e.g. 30"></div>
      <div><label>Your target hourly rate</label><input id="rate" type="number" min="0" placeholder="e.g. 120"></div>
    </div>
    <label>Extra value (materials, voice support, bonuses) — flat amount</label>
    <input id="extra" type="number" min="0" placeholder="e.g. 150">
    <button class="btn" onclick="calc()">Calculate Pricing</button>
  </div>

  <div class="tiers" id="tiers"></div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), n=id=>parseFloat(g(id).value)||0;
  const fmt=x=>x.toLocaleString(undefined,{maximumFractionDigits:0});
  function calc(){
    const s=n('sessions'), mins=n('mins'), prep=n('prep'), rate=n('rate'), extra=n('extra');
    if(!s||!mins||!rate){ alert('Enter sessions, minutes and your hourly rate.'); return; }
    const hours=s*(mins+prep)/60;
    const base=hours*rate+extra;
    const round=x=>Math.ceil(x/25)*25;
    const ess=round(base), std=round(base*1.4), prem=round(base*2);
    g('tiers').style.display='block';
    g('tiers').innerHTML=
      '<div class="tier"><div class="nm">Essentials</div><div class="pr">'+fmt(ess)+'</div><div class="ds">Covers your time fully. Your floor price — never go below this.</div></div>'+
      '<div class="tier feat"><div class="nm">Signature ★ recommended</div><div class="pr">'+fmt(std)+'</div><div class="ds">Prices in your expertise and results, not just hours. Quote this first.</div></div>'+
      '<div class="tier"><div class="nm">Premium</div><div class="pr">'+fmt(prem)+'</div><div class="ds">For high-touch support and faster transformation. Add VIP elements.</div></div>'+
      '<div class="note">Based on '+hours.toFixed(1)+' hours of work at your rate, plus extras. Clients pay for the transformation — value-based pricing almost always beats hourly.</div>';
    g('tiers').scrollIntoView({behavior:'smooth'});
  }
</script>
</body>
</html>
