<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Identity Shift Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #3A1259; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #D6A24E; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2C0A45; border: 1px solid #6E419C; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  input:focus, textarea:focus { outline: none; border-color: #D6A24E; }
  textarea { min-height: 50px; }
  .panel { background: #4C2473; border: 1px solid #5C3187; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #D6A24E; color: #3A1259; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; margin: 14px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #D6A24E; border: 1px solid #D6A24E; }
  .blk { background: #2C0A45; border: 1px solid #6E419C; border-left: 3px solid #D6A24E; border-radius: 8px; padding: 13px 16px; margin-bottom: 10px; }
  .blk h4 { color: #D6A24E; font-size: .76rem; text-transform: uppercase; margin-bottom: 5px; }
  .blk p { font-size: .93rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Identity Shift Tool</h1>
  <p class="sub">Real change happens at the identity level. Map who you are becoming — and what that person actually does differently.</p>

  <div class="panel">
    <label for="old">Old identity (what you are leaving behind)</label>
    <input id="old" placeholder='e.g. "person who waits to feel ready"'>
    <label for="new">New identity (who you are becoming)</label>
    <input id="new" placeholder='e.g. "person who ships imperfectly"'>
    <label for="acts">What does the new identity do every day?</label>
    <textarea id="acts" placeholder="3-5 specific actions or habits"></textarea>
    <label for="never">What does the new identity NOT do?</label>
    <textarea id="never" placeholder="Behaviours that belong to the old self"></textarea>
    <button class="btn" onclick="gen()">Cement the Shift</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <div id="out"></div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['old','new','acts','never'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('ist_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('ist_'+k,g(k).value)); });
  function gen(){
    g('out').innerHTML='<div class="blk"><h4>Old identity</h4><p>'+esc(v('old')||'—')+'</p></div>'+
      '<div class="blk"><h4>New identity</h4><p>'+esc(v('new')||'—')+'</p></div>'+
      '<div class="blk"><h4>What the new identity does</h4><p>'+esc(v('acts')||'—')+'</p></div>'+
      '<div class="blk"><h4>What the new identity does NOT do</h4><p>'+esc(v('never')||'—')+'</p></div>'+
      '<div class="blk" style="border-left-color:#D8C6EA"><h4>The rule</h4><p>Every decision today, ask: <b style="color:#D6A24E">"Is this what '+esc(v('new')||'the new me')+' does?"</b> If no, choose differently. Identity is the sum of these tiny choices. Do them long enough and the identity is no longer aspiration — it is just who you are.</p></div>';
    g('out').scrollIntoView({behavior:'smooth'});
  }
  function esc(t){ return (t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  function copyOut(){ const t=g('out').innerText; if(!t){alert('Run it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
  gen();
</script>
</body>
</html>
