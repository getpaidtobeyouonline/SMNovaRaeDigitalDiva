<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monthly Growth Assessment</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #3A1259; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #D6A24E; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2C0A45; border: 1px solid #6E419C; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  input:focus, textarea:focus { outline: none; border-color: #D6A24E; }
  textarea { min-height: 50px; }
  .panel { background: #4C2473; border: 1px solid #5C3187; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #D6A24E; color: #3A1259; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; margin: 14px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #D6A24E; border: 1px solid #D6A24E; }
  .blk { background: #2C0A45; border: 1px solid #6E419C; border-left: 3px solid #D6A24E; border-radius: 8px; padding: 13px 16px; margin-bottom: 10px; }
  .blk h4 { color: #D6A24E; font-size: .76rem; text-transform: uppercase; margin-bottom: 5px; }
  .blk p { font-size: .93rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Monthly Growth Assessment</h1>
  <p class="sub">A 30-day inventory of who you are becoming, not just what you got done.</p>

  <div class="panel">
    <label for="month">Month</label>
    <input id="month" type="month">
    <label for="grew">Where did I actually grow?</label>
    <textarea id="grew" placeholder="A skill, a belief, a habit"></textarea>
    <label for="brave">A brave moment this month</label>
    <textarea id="brave" placeholder="Whatever you did that scared you"></textarea>
    <label for="kind">A kind thing I did for myself</label>
    <input id="kind" placeholder="Big or small">
    <label for="repeat">What pattern do I see repeating?</label>
    <textarea id="repeat" placeholder="Good or bad — name it"></textarea>
    <label for="next">What will I do differently next month?</label>
    <textarea id="next" placeholder="One concrete thing"></textarea>
    <button class="btn" onclick="gen()">Assess the Month</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <div id="out"></div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['month','grew','brave','kind','repeat','next'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('mga_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('mga_'+k,g(k).value)); });
  function gen(){
    g('out').innerHTML='<div class="blk"><h4>Growth this month</h4><p>'+esc(v('grew')||'—')+'</p></div>'+
      '<div class="blk"><h4>Brave moment</h4><p>'+esc(v('brave')||'—')+'</p></div>'+
      '<div class="blk"><h4>Kindness to self</h4><p>'+esc(v('kind')||'—')+'</p></div>'+
      '<div class="blk"><h4>Pattern I see</h4><p>'+esc(v('repeat')||'—')+'</p></div>'+
      '<div class="blk"><h4>One thing different next month</h4><p>'+esc(v('next')||'—')+'</p></div>';
    g('out').scrollIntoView({behavior:'smooth'});
  }
  function esc(t){ return (t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  function copyOut(){ const t=g('out').innerText; if(!t){alert('Assess first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
  gen();
</script>
</body>
</html>
