<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holiday Meal Budget Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #3A1259; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 620px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.85rem; color: #D6A24E; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2C0A45; border: 1px solid #6E419C; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #D6A24E; }
  .panel { background: #4C2473; border: 1px solid #5C3187; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 90px; }
  .btn { background: #D6A24E; color: #3A1259; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #D6A24E; border: 1px solid #D6A24E; }
  .result { background: #2C0A45; border: 1px solid #6E419C; border-left: 3px solid #D6A24E; border-radius: 8px; padding: 14px; text-align: center; margin-bottom: 12px; }
  .result .big { font-family: 'Playfair Display', serif; font-size: 2rem; }
  .result .l { font-size: .8rem; opacity: .7; }
  .item { background: #2C0A45; border: 1px solid #6E419C; border-radius: 7px; padding: 7px 12px; margin-bottom: 5px; display: flex; align-items: center; gap: 9px; font-size: .86rem; }
  .box { width: 18px; height: 18px; border: 2px solid #D6A24E; border-radius: 5px; flex: none; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: .68rem; font-weight: 700; }
  .box.on { background: #D6A24E; color: #3A1259; }
  .item.done .lb { text-decoration: line-through; opacity: .5; }
  .item .cost { color: #D6A24E; font-size: .8rem; flex: none; }
  .item .x { margin-left: auto; cursor: pointer; opacity: .5; } .item .x:hover { opacity: 1; color: #D6A24E; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 10px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Holiday Meal Budget Tool</h1>
  <p class="sub">Plan the big festive meal without the bill being a nasty surprise.</p>

  <div class="panel">
    <label>Total budget for the holiday meal</label>
    <input id="budget" type="number" min="0" placeholder="e.g. 150" oninput="saveB();render()">
  </div>

  <div class="result" id="result"></div>

  <div class="panel">
    <div class="row">
      <div style="flex:2"><label>Item</label><input id="label" placeholder="e.g. The main / dessert / drinks"></div>
      <div><label>Est. cost</label><input id="amt" type="number" min="0" step="0.01" placeholder="0"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
    <p style="font-size:.78rem;opacity:.6;margin-top:8px">Tick items once bought.</p>
    <div id="list" style="margin-top:6px"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:8px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('hmbt')||'[]');
  const save=()=>localStorage.setItem('hmbt',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const fmt=n=>n.toLocaleString(undefined,{maximumFractionDigits:0});
  if(localStorage.getItem('hmbt_budget'))g('budget').value=localStorage.getItem('hmbt_budget');
  function saveB(){ localStorage.setItem('hmbt_budget',g('budget').value); }
  function add(){ const a=parseFloat(g('amt').value)||0; if(!v('label')||!a){ alert('Enter an item and cost.'); return; }
    R.push({l:v('label'),a,done:false}); g('label').value=''; g('amt').value=''; save(); render(); }
  function toggle(i){ R[i].done=!R[i].done; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear the list?')){ R=[]; save(); render(); } }
  function render(){
    const planned=R.reduce((s,x)=>s+x.a,0);
    const budget=parseFloat(g('budget').value)||0;
    const left=budget-planned;
    g('result').innerHTML='<div class="big" style="color:'+(left>=0?'#D6A24E':'#D6A24E')+'">'+fmt(left)+'</div><div class="l">'+(left>=0?'under budget':'over budget')+' · planned '+fmt(planned)+(budget?' of '+fmt(budget):'')+'</div>';
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No items added yet.</div>'; return; }
    L.innerHTML=R.map((x,i)=>'<div class="item'+(x.done?' done':'')+'"><span class="box'+(x.done?' on':'')+'" onclick="toggle('+i+')">'+(x.done?'✓':'')+'</span><span class="lb">'+esc(x.l)+'</span><span class="cost">'+fmt(x.a)+'</span><span class="x" onclick="del('+i+')">✕</span></div>').join('');
  }
  render();
</script>
</body>
</html>
