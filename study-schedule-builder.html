<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Schedule Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #3A1259; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.95rem; color: #D6A24E; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2C0A45; border: 1px solid #6E419C; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #D6A24E; }
  .panel { background: #4C2473; border: 1px solid #5C3187; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 90px; }
  .btn { background: #D6A24E; color: #3A1259; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #D6A24E; border: 1px solid #D6A24E; }
  .day { margin-bottom: 10px; }
  .day .dh { font-size: .8rem; color: #D6A24E; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; display: flex; justify-content: space-between; }
  .slot { background: #2C0A45; border: 1px solid #6E419C; border-radius: 7px; padding: 7px 12px; margin-bottom: 4px; display: flex; align-items: center; gap: 9px; font-size: .86rem; }
  .box { width: 18px; height: 18px; border: 2px solid #D6A24E; border-radius: 5px; flex: none; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: .68rem; font-weight: 700; }
  .box.on { background: #D6A24E; color: #3A1259; }
  .slot.done .lb { text-decoration: line-through; opacity: .5; }
  .slot .tm { color: #D6A24E; font-size: .8rem; flex: none; }
  .slot .x { margin-left: auto; cursor: pointer; opacity: .5; } .slot .x:hover { opacity: 1; color: #D6A24E; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 10px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.55rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Study Schedule Builder</h1>
  <p class="sub">Block out your study week. A planned slot is far more likely to actually happen.</p>

  <div class="panel">
    <div class="row">
      <div><label>Day</label><select id="day"><option>Monday</option><option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option><option>Saturday</option><option>Sunday</option></select></div>
      <div><label>Time</label><input id="time" placeholder="e.g. 4-5pm"></div>
      <div style="flex:2"><label>Subject / task</label><input id="subj" placeholder="What you will study"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
  </div>

  <div class="panel">
    <div id="list"></div>
    <button class="btn ghost" onclick="resetChecks()" style="margin-top:10px">Uncheck All</button>
    <button class="btn ghost" onclick="clearAll()">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  const DAYS=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
  let R=JSON.parse(localStorage.getItem('ssb')||'[]');
  const save=()=>localStorage.setItem('ssb',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ if(!v('subj')){ alert('Enter a subject or task.'); return; }
    R.push({day:g('day').value,time:v('time'),subj:v('subj'),done:false}); g('time').value=''; g('subj').value=''; save(); render(); }
  function toggle(i){ R[i].done=!R[i].done; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function resetChecks(){ R.forEach(x=>x.done=false); save(); render(); }
  function clearAll(){ if(confirm('Clear the whole schedule?')){ R=[]; save(); render(); } }
  function render(){
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No study slots yet — block out your week.</div>'; return; }
    L.innerHTML=DAYS.map(d=>{
      const items=R.map((x,i)=>({x,i})).filter(o=>o.x.day===d);
      if(!items.length)return '';
      const mins=items.length;
      return '<div class="day"><div class="dh"><span>'+d+'</span><span style="opacity:.6">'+mins+' slot'+(mins>1?'s':'')+'</span></div>'+items.map(({x,i})=>
        '<div class="slot'+(x.done?' done':'')+'"><span class="box'+(x.done?' on':'')+'" onclick="toggle('+i+')">'+(x.done?'✓':'')+'</span>'+(x.time?'<span class="tm">'+esc(x.time)+'</span>':'')+'<span class="lb">'+esc(x.subj)+'</span><span class="x" onclick="del('+i+')">✕</span></div>').join('')+'</div>';
    }).join('');
  }
  render();
</script>
</body>
</html>
