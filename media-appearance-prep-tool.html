<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Media Appearance Prep Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #3A1259; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: #D6A24E; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 18px; font-size: .95rem; }
  .panel { background: #4C2473; border: 1px solid #5C3187; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .bar { height: 9px; background: #2C0A45; border-radius: 6px; overflow: hidden; margin: 8px 0 4px; }
  .bar i { display: block; height: 100%; background: #D6A24E; width: 0; transition: width .3s; }
  .count { text-align: center; font-size: .85rem; color: #D6A24E; margin-bottom: 4px; }
  .grp { font-size: .76rem; text-transform: uppercase; letter-spacing: .04em; color: #D6A24E; margin: 16px 0 7px; }
  .item { display: flex; gap: 10px; align-items: flex-start; background: #2C0A45; border: 1px solid #6E419C; border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; cursor: pointer; }
  .item.done { border-color: #D6A24E; opacity: .55; }
  .box { width: 20px; height: 20px; border: 2px solid #D6A24E; border-radius: 5px; flex: none; display: flex; align-items: center; justify-content: center; font-size: .8rem; color: #D6A24E; }
  .item.done .box::after { content: '\2713'; }
  .btn { background: transparent; color: #D6A24E; border: 1px solid #D6A24E; cursor: pointer; font-size: .85rem; padding: 8px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; margin-top: 12px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.4rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Media Appearance Prep Tool</h1>
  <p class="sub">Show up on a podcast, interview or panel polished and at ease.</p>

  <div class="panel">
    <div class="count" id="count">0 / 0 done</div>
    <div class="bar"><i id="fill"></i></div>
    <div id="list"></div>
    <button class="btn" onclick="reset()">Reset Checklist</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const ITEMS={
    'Before — research': ['Know the show, host and audience','Listen to or watch a recent episode','Confirm date, time, platform and running time','Ask the host what they want to cover'],
    'Your key messages': ['Decide the 3 key points you want to land','Have a story or example ready for each point','Prepare your concise "who I help and how" intro','Know your one clear call to action and where to send people'],
    'On the day': ['Test camera, mic, lighting and internet early','Tidy your background and silence notifications','Have water and your notes nearby','Arrive or log on a few minutes early, calm and warm'],
    'After': ['Thank the host and share the episode widely','Repurpose it into clips, posts and an email','Follow up with anyone who reached out','Add it to your media / press page']
  };
  const KEY='mapt'; let done=JSON.parse(localStorage.getItem(KEY)||'{}');
  const g=id=>document.getElementById(id);
  function render(){
    const L=g('list'); L.innerHTML=''; let total=0,ch=0;
    Object.keys(ITEMS).forEach(grp=>{
      const h=document.createElement('div'); h.className='grp'; h.textContent=grp; L.appendChild(h);
      ITEMS[grp].forEach(txt=>{
        total++; const id=grp+'|'+txt; if(done[id])ch++;
        const d=document.createElement('div'); d.className='item'+(done[id]?' done':'');
        d.innerHTML='<div class="box"></div><div>'+txt+'</div>';
        d.onclick=()=>{ done[id]=!done[id]; localStorage.setItem(KEY,JSON.stringify(done)); render(); };
        L.appendChild(d);
      });
    });
    g('fill').style.width=total?Math.round(ch/total*100)+'%':'0%';
    g('count').textContent=ch+' / '+total+' done';
  }
  function reset(){ if(confirm('Reset the checklist?')){ done={}; localStorage.setItem(KEY,'{}'); render(); } }
  render();
</script>
</body>
</html>
