<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subscription Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #3A1259; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #D6A24E; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2C0A45; border: 1px solid #6E419C; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #D6A24E; }
  .panel { background: #4C2473; border: 1px solid #5C3187; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 90px; }
  .btn { background: #D6A24E; color: #3A1259; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #D6A24E; border: 1px solid #D6A24E; }
  .stats { display: flex; gap: 10px; margin-bottom: 12px; }
  .stat { flex: 1; background: #4C2473; border: 1px solid #5C3187; border-radius: 10px; padding: 13px; text-align: center; }
  .stat .v { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: #D6A24E; }
  .stat .l { font-size: .66rem; opacity: .65; text-transform: uppercase; }
  .row2 { background: #2C0A45; border: 1px solid #6E419C; border-radius: 7px; padding: 8px 12px; margin-bottom: 5px; display: flex; justify-content: space-between; font-size: .86rem; gap: 8px; }
  .row2 .x { cursor: pointer; opacity: .5; } .row2 .x:hover { opacity: 1; color: #D6A24E; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 10px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Subscription Tracker</h1>
  <p class="sub">List every subscription and see the true monthly and yearly total. Most people are surprised.</p>

  <div class="panel">
    <div class="row">
      <div style="flex:2"><label>Subscription</label><input id="name" placeholder="e.g. Streaming service"></div>
      <div><label>Cost</label><input id="cost" type="number" min="0" step="0.01" placeholder="0"></div>
      <div><label>Billing</label><select id="cycle"><option value="1">Monthly</option><option value="0.25">Weekly</option><option value="0.0833">Yearly</option></select></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="v" id="sMonth">0</div><div class="l">Per month</div></div>
    <div class="stat"><div class="v" id="sYear">0</div><div class="l">Per year</div></div>
    <div class="stat"><div class="v" id="sCount">0</div><div class="l">Subscriptions</div></div>
  </div>

  <div class="panel">
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:8px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('subt')||'[]');
  const save=()=>localStorage.setItem('subt',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const fmt=n=>n.toLocaleString(undefined,{maximumFractionDigits:0});
  function add(){ const c=parseFloat(g('cost').value)||0; if(!v('name')||!c){ alert('Enter a name and cost.'); return; }
    R.push({n:v('name'),c,cyc:+g('cycle').value}); g('name').value=''; g('cost').value=''; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all subscriptions?')){ R=[]; save(); render(); } }
  function monthly(x){ return x.cyc===1?x.c:x.cyc===0.25?x.c*52/12:x.c/12; }
  function render(){
    const total=R.reduce((s,x)=>s+monthly(x),0);
    g('sMonth').textContent=fmt(total);
    g('sYear').textContent=fmt(total*12);
    g('sCount').textContent=R.length;
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No subscriptions added yet.</div>'; return; }
    const cmap={1:'monthly',0.25:'weekly'};
    L.innerHTML=R.map((x,i)=>({x,i})).sort((a,b)=>monthly(b.x)-monthly(a.x)).map(({x,i})=>
      '<div class="row2"><span>'+esc(x.n)+' <span style="opacity:.6">· '+(cmap[x.cyc]||'yearly')+'</span></span><span><b style="color:#D6A24E">'+fmt(monthly(x))+'/mo</b> <span class="x" onclick="del('+i+')">✕</span></span></div>').join('');
  }
  render();
</script>
</body>
</html>
