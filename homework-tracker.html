<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homework Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #3A1259; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 660px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #D6A24E; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input { width: 100%; background: #2C0A45; border: 1px solid #6E419C; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus { outline: none; border-color: #D6A24E; }
  .panel { background: #4C2473; border: 1px solid #5C3187; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 90px; }
  .btn { background: #D6A24E; color: #3A1259; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #D6A24E; border: 1px solid #D6A24E; }
  .hw { background: #2C0A45; border: 1px solid #6E419C; border-radius: 7px; padding: 8px 12px; margin-bottom: 5px; display: flex; align-items: center; gap: 9px; font-size: .87rem; }
  .hw.due { border-left: 3px solid #D6A24E; }
  .hw.overdue { border-left: 3px solid #D6A24E; }
  .box { width: 19px; height: 19px; border: 2px solid #D6A24E; border-radius: 5px; flex: none; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: .7rem; font-weight: 700; }
  .box.on { background: #D6A24E; color: #3A1259; }
  .hw.done .lb { text-decoration: line-through; opacity: .5; }
  .hw .when { font-size: .78rem; color: #D6A24E; flex: none; }
  .hw .x { cursor: pointer; opacity: .5; flex: none; } .hw .x:hover { opacity: 1; color: #D6A24E; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 12px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Homework Tracker</h1>
  <p class="sub">Track every assignment by due date — so nothing gets forgotten or rushed.</p>

  <div class="panel">
    <div class="row">
      <div><label>Subject</label><input id="subject" placeholder="e.g. Maths"></div>
      <div style="flex:2"><label>Assignment</label><input id="task" placeholder="e.g. Worksheet pages 4-6"></div>
      <div><label>Due</label><input id="due" type="date"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
  </div>

  <div class="panel">
    <div id="list"></div>
    <button class="btn ghost" onclick="clearDone()" style="margin-top:8px">Clear Done</button>
    <button class="btn ghost" onclick="clearAll()">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('hwt2')||'[]');
  const save=()=>localStorage.setItem('hwt2',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ if(!v('task')){ alert('Enter an assignment.'); return; }
    R.push({s:v('subject'),t:v('task'),d:g('due').value,done:false}); g('subject').value=''; g('task').value=''; g('due').value=''; save(); render(); }
  function toggle(i){ R[i].done=!R[i].done; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearDone(){ R=R.filter(x=>!x.done); save(); render(); }
  function clearAll(){ if(confirm('Clear all homework?')){ R=[]; save(); render(); } }
  function render(){
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No homework added yet.</div>'; return; }
    const today=new Date().setHours(0,0,0,0);
    L.innerHTML=R.map((x,i)=>({x,i,du:x.d?Math.ceil((new Date(x.d)-today)/86400000):9999})).sort((a,b)=>(a.x.done-b.x.done)||(a.du-b.du)).map(({x,i,du})=>{
      let cls=x.done?' done':'', lbl='';
      if(!x.done&&x.d){ if(du<0){ cls+=' overdue'; lbl='⚠ '+(-du)+'d late'; } else if(du===0){ cls+=' due'; lbl='today'; } else if(du<=2){ cls+=' due'; lbl='in '+du+'d'; } else lbl='in '+du+'d'; }
      return '<div class="hw'+cls+'"><span class="box'+(x.done?' on':'')+'" onclick="toggle('+i+')">'+(x.done?'✓':'')+'</span><span class="lb">'+(x.s?'<b style="color:#D6A24E">'+esc(x.s)+'</b> · ':'')+esc(x.t)+'</span><span class="when">'+lbl+'</span><span class="x" onclick="del('+i+')">✕</span></div>';
    }).join('');
  }
  render();
</script>
</body>
</html>
