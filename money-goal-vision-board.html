<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Goal Vision Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #3A1259; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 760px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #D6A24E; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 8px 0 5px; }
  input { width: 100%; background: #2C0A45; border: 1px solid #6E419C; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus { outline: none; border-color: #D6A24E; }
  .panel { background: #4C2473; border: 1px solid #5C3187; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; } .row>div { flex: 1; min-width: 130px; }
  .btn { background: #D6A24E; color: #3A1259; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #D6A24E; border: 1px solid #D6A24E; margin-top: 12px; }
  .board { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap: 12px; }
  .card { background: #2C0A45; border: 1px solid #6E419C; border-left: 3px solid #D6A24E; border-radius: 10px; padding: 14px; text-align: center; }
  .card .emoji { font-size: 2rem; }
  .card .nm { font-family: 'Playfair Display', serif; color: #D6A24E; font-size: 1.05rem; margin-top: 6px; }
  .card .amt { font-size: .85rem; opacity: .8; margin-top: 4px; }
  .card .by { font-size: .78rem; opacity: .6; margin-top: 4px; }
  .card .x { cursor: pointer; opacity: .5; font-size: .8rem; margin-top: 6px; display: inline-block; } .card .x:hover { opacity: 1; color: #D6A24E; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 14px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Money Goal Vision Board</h1>
  <p class="sub">Visual money goals with an emoji each. Look at the board, not just the number.</p>

  <div class="panel">
    <div class="row">
      <div><label>Emoji</label><input id="em" placeholder="🏡" maxlength="2"></div>
      <div style="flex:2"><label>Goal</label><input id="nm" placeholder="e.g. House deposit"></div>
      <div><label>Amount ($)</label><input id="amt" type="number" min="0"></div>
      <div><label>By date</label><input id="by" type="date"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Pin</button></div>
    </div>
  </div>

  <div class="board" id="board"></div>
  <button class="btn ghost" onclick="clearAll()">Clear All</button>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let G=JSON.parse(localStorage.getItem('mgvb')||'[]');
  const save=()=>localStorage.setItem('mgvb',JSON.stringify(G));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ const nm=v('nm'); if(!nm){alert('Name the goal.');return;} G.push({em:v('em')||'⭐',nm,amt:parseFloat(g('amt').value)||0,by:v('by')}); ['em','nm','amt','by'].forEach(k=>g(k).value=''); save(); render(); }
  function del(i){ G.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all?')){ G=[]; save(); render(); } }
  function render(){
    const B=g('board');
    if(!G.length){ B.innerHTML='<div class="empty" style="grid-column:1/-1">No goals pinned yet — what do you want money to make possible?</div>'; return; }
    B.innerHTML=G.map((x,i)=>`<div class="card"><div class="emoji">${esc(x.em)}</div><div class="nm">${esc(x.nm)}</div>${x.amt?`<div class="amt">$${x.amt.toLocaleString()}</div>`:''}${x.by?`<div class="by">by ${esc(x.by)}</div>`:''}<span class="x" onclick="del(${i})">✕</span></div>`).join('');
  }
  render();
</script>
</body>
</html>
